name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Publish all publications locally
        run: ./gradlew publish --no-configuration-cache
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Zip deployment bundle
        run: |
          cd multispot/build/repo
          zip -r ../../../bundle.zip .

      - name: Upload bundle to Sonatype Central Portal
        run: |
          token=$(echo -n "${{ secrets.OSSRH_USERNAME }}:${{ secrets.OSSRH_PASSWORD }}" | base64)
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            --header "Authorization: Bearer $token" \
            -F "bundle=@bundle.zip;type=application/zip" \
            "https://central.sonatype.com/api/v1/publisher/upload?name=multispot-${{ github.ref_name }}&publishingType=USER_MANAGED")
          
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1 | cut -d':' -f2)
          
          echo "Response Body:"
          echo "$body"
          echo "HTTP Status Code: $status"
          
          if [ "$status" -ne 200 ] && [ "$status" -ne 201 ]; then
            echo "Error: Upload failed with status $status"
            exit 1
          fi
